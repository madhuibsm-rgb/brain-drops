t-placeholder-val=\"{{ true }}\">\n      <div>\n        <span style=\"font-size:11px; letter-spacing:.32em; font-weight:700; text-transform:uppercase; color:var(--bd-gold-dp,#B8932C);\">Join The Waitlist<\u002Fspan>\n        <h3 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(28px,4vw,38px); line-height:1.06; color:var(--bd-deep,#3F1419); margin:10px 0 10px; text-wrap:balance;\">Be First To Start Your Clarity Ritual.<\u002Fh3>\n        <p style=\"font-size:14.5px; line-height:1.55; color:rgba(74,16,32,.7); margin:0 0 24px;\">Tell us a little about you and we’ll let you know the moment Brain Drops is ready.<\u002Fp>\n        <form onsubmit=\"{{ submitWaitlist }}\" style=\"display:flex; flex-direction:column; gap:12px;\">\n          <input ref=\"{{ nameRef }}\" type=\"text\" required=\"\" placeholder=\"Your name\" autocomplete=\"name\" style=\"width:100%; padding:15px 18px; border-radius:14px; border:1px solid rgba(91,31,35,.22); background:rgba(255,255,255,.7); font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:var(--bd-deep,#3F1419); outline:none; transition:border-color .3s, box-shadow .3s;\" style-focus=\"border-color:var(--bd-gold,#D4AF37); box-shadow:0 0 0 4px rgba(212,175,55,.18)\">\n          <input ref=\"{{ emailRef }}\" type=\"email\" required=\"\" placeholder=\"you@email.com\" autocomplete=\"email\" style=\"width:100%; padding:15px 18px; border-radius:14px; border:1px solid rgba(91,31,35,.22); background:rgba(255,255,255,.7); font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:var(--bd-deep,#3F1419); outline:none; transition:border-color .3s, box-shadow .3s;\" style-focus=\"border-color:var(--bd-gold,#D4AF37); box-shadow:0 0 0 4px rgba(212,175,55,.18)\">\n          <input ref=\"{{ cityRef }}\" type=\"text\" required=\"\" placeholder=\"Your city\" autocomplete=\"address-level2\" style=\"width:100%; padding:15px 18px; border-radius:14px; border:1px solid rgba(91,31,35,.22); background:rgba(255,255,255,.7); font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:var(--bd-deep,#3F1419); outline:none; transition:border-color .3s, box-shadow .3s;\" style-focus=\"border-color:var(--bd-gold,#D4AF37); box-shadow:0 0 0 4px rgba(212,175,55,.18)\">\n          <input ref=\"{{ phoneRef }}\" type=\"tel\" placeholder=\"Phone number (optional)\" autocomplete=\"tel\" style=\"width:100%; padding:15px 18px; border-radius:14px; border:1px solid rgba(91,31,35,.22); background:rgba(255,255,255,.7); font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:var(--bd-deep,#3F1419); outline:none; transition:border-color .3s, box-shadow .3s;\" style-focus=\"border-color:var(--bd-gold,#D4AF37); box-shadow:0 0 0 4px rgba(212,175,55,.18)\">\n          <sc-if value=\"{{ showErr }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px; color:#a8324a; padding-left:4px;\">{{ errMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <button type=\"submit\" style=\"position:relative; overflow:hidden; margin-top:4px; width:100%; padding:16px; border:none; border-radius:14px; cursor:pointer; font-family:'Hanken Grotesk',sans-serif; font-size:15px; font-weight:700; letter-spacing:.01em; color:var(--bd-deep,#3F1419); background:linear-gradient(180deg,#f4dd97 0%, var(--bd-gold,#D4AF37) 60%, #b88f29 100%); box-shadow:0 14px 34px -12px rgba(212,175,55,.75), inset 0 1px 0 rgba(255,255,255,.6); transition:transform .3s, box-shadow .3s;\" style-hover=\"transform:translateY(-2px); box-shadow:0 20px 44px -14px rgba(212,175,55,.9)\" style-active=\"transform:translateY(0)\">Join The Waitlist<\u002Fbutton>\n        <\u002Fform>\n        <p style=\"font-size:11.5px; color:rgba(74,16,32,.5); text-align:center; margin:16px 0 0;\">No spam. Just clarity. Unsubscribe anytime.<\u002Fp>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ showSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center; padding:8px 0 6px;\">\n        <div style=\"width:64px; height:64px; margin:0 auto 20px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg,#f4dd97,var(--bd-gold,#D4AF37)); color:var(--bd-deep,#3F1419); font-size:28px; box-shadow:0 12px 30px -10px rgba(212,175,55,.8);\">✓<\u002Fdiv>\n        <span style=\"font-size:11px; letter-spacing:.32em; font-weight:700; text-transform:uppercase; color:var(--bd-gold-dp,#B8932C);\">Welcome To The Ritual<\u002Fspan>\n        <h3 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(28px,4vw,36px); line-height:1.08; color:var(--bd-deep,#3F1419); margin:8px 0 10px;\">{{ successHeading }}<\u002Fh3>\n        <p style=\"font-size:14.5px; line-height:1.55; color:rgba(74,16,32,.72); margin:0 0 24px;\">{{ successMsg }}<\u002Fp>\n        <button onclick=\"{{ closeWaitlist }}\" style=\"padding:13px 30px; border:1px solid rgba(91,31,35,.25); border-radius:999px; cursor:pointer; background:rgba(255,255,255,.5); font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:600; color:var(--bd-deep,#3F1419); transition:background .3s;\" style-hover=\"background:rgba(255,255,255,.85)\">Done<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#D4AF37&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accentLightColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E3C766&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;burgundyColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#5B1F23&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;ivoryColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F8EDE3&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;sheetEndpoint&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.bgRef = React.createRef();\n    this.sachetRef = React.createRef();\n    this.contentRef = React.createRef();\n    this.videoRef = React.createRef();\n    this.clipVideoRef = React.createRef();\n    this.nameRef = React.createRef();\n    this.emailRef = React.createRef();\n    this.cityRef = React.createRef();\n    this.phoneRef = React.createRef();\n    this.target = { x:0, y:0 };\n    this.cur = { x:0, y:0 };\n  }\n\n  applyTokens(){\n    const r = this.rootRef.current; if(!r) return;\n    const p = this.props || {};\n    if(p.accentColor){ r.style.setProperty('--bd-gold', p.accentColor); }\n    if(p.accentLightColor){ r.style.setProperty('--bd-gold-lt', p.accentLightColor); }\n    if(p.burgundyColor){ r.style.setProperty('--bd-burgundy', p.burgundyColor); }\n    if(p.ivoryColor){ r.style.setProperty('--bd-ivory', p.ivoryColor); }\n  }\n\n  componentDidMount(){\n    this.applyTokens();\n\n    // Hero parallax (mouse + light scroll)\n    this._onMove = (e) => {\n      this.target.x = (e.clientX / window.innerWidth - 0.5);\n      this.target.y = (e.clientY / window.innerHeight - 0.5);\n    };\n    window.addEventListener('mousemove', this._onMove, { passive:true });\n    const loop = () => {\n      this.cur.x += (this.target.x - this.cur.x) * 0.07;\n      this.cur.y += (this.target.y - this.cur.y) * 0.07;\n      const x = this.cur.x, y = this.cur.y;\n      const sc = window.scrollY || 0;\n      if(this.bgRef.current){\n        this.bgRef.current.style.transform = `scale(1.06) translate3d(${x*-26}px, ${(y*-20)+(sc*0.08)}px, 0)`;\n      }\n      if(this.sachetRef.current){\n        this.sachetRef.current.style.transform = `translate3d(${x*46}px, ${(y*40)}px, 0)`;\n      }\n      if(this.contentRef.current){\n        this.contentRef.current.style.opacity = String(Math.max(0, 1 - sc/620));\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    this._raf = requestAnimationFrame(loop);\n\n    // Scroll-triggered reveals\n    const root = this.rootRef.current;\n    if(root && 'IntersectionObserver' in window){\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if(en.isIntersecting){\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'none';\n            io.unobserve(en.target);\n          }\n        });\n      }, { threshold:0.12, rootMargin:'0px 0px -8% 0px' });\n      root.querySelectorAll('[data-reveal]').forEach(el => io.observe(el));\n      this._io = io;\n    }\n\n    this.setupHls(0);\n    this.initInteractions();\n  }\n\n  setupHls(tries){\n    const video = this.clipVideoRef.current;\n    if(!video) return;\n    const SRC = 'https://stream.mux.com/bnYL6x5cAX6WiJv2pOKpITehZd3NVdXpj3ylJFpX5Lk.m3u8';\n    const HlsLib = window.Hls;\n    if(HlsLib && HlsLib.isSupported()){\n      const hls = new HlsLib({ startLevel:-1, capLevelToPlayerSize:false, maxMaxBufferLength:60, enableWorker:true });\n      hls.loadSource(SRC);\n      hls.attachMedia(video);\n      hls.on(HlsLib.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });\n      this._hls = hls;\n    } else if(video.canPlayType('application/vnd.apple.mpegurl')){\n      video.src = SRC;\n      video.play().catch(() => {});\n    } else if((tries || 0) < 25){\n      setTimeout(() => this.setupHls((tries || 0) + 1), 200);\n    }\n  }\n\n  initInteractions(){\n    const root = this.rootRef.current; if(!root) return;\n    const cmp = root.querySelector('[data-cmp]'); if(!cmp) return;\n    this._cmpEl = cmp;\n    this._down = (e) => {\n      const target = e.target.closest('[data-card]');\n      if(!target || !cmp.contains(target)) return;\n      e.preventDefault();\n      this._drag = { el:target, sx:e.clientX, sy:e.clientY, moved:false, isVid: target.hasAttribute('data-vid') };\n      target.style.transition = 'none';\n      target.style.zIndex = '40';\n      target.style.cursor = 'grabbing';\n      document.body.style.userSelect = 'none';\n    };\n    this._move = (e) => {\n      if(!this._drag) return;\n      const dx = e.clientX - this._drag.sx, dy = e.clientY - this._drag.sy;\n      if(Math.abs(dx) > 4 || Math.abs(dy) > 4) this._drag.moved = true;\n      this._drag.el.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx * 0.025}deg) scale(1.05)`;\n      this._drag.el.style.boxShadow = '0 34px 56px -24px rgba(63,20,25,.45)';\n    };\n    this._up = () => {\n      if(!this._drag) return;\n      const el = this._drag.el, moved = this._drag.moved, isVid = this._drag.isVid;\n      el.style.transition = 'transform .6s cubic-bezier(.2,.9,.25,1.2), box-shadow .4s, border-color .3s';\n      el.style.cursor = 'grab';\n      document.body.style.userSelect = '';\n      if(!moved){ isVid ? this.toggleVideo() : this.toggleCard(el); }\n      const sel = el.dataset.selected === '1';\n      el.style.transform = sel ? 'translateY(-6px) scale(1.02)' : '';\n      el.style.boxShadow = sel ? '0 22px 44px -22px rgba(212,175,55,.55)' : '';\n      setTimeout(() => { if(el) el.style.zIndex = ''; }, 600);\n      this._drag = null;\n    };\n    cmp.addEventListener('pointerdown', this._down);\n    window.addEventListener('pointermove', this._move, { passive:true });\n    window.addEventListener('pointerup', this._up, { passive:true });\n  }\n\n  toggleCard(el){\n    const sel = el.dataset.selected === '1';\n    el.dataset.selected = sel ? '0' : '1';\n    el.style.borderColor = sel ? '' : 'rgba(212,175,55,.85)';\n  }\n\n  toggleVideo(){\n    const v = this.clipVideoRef.current; if(!v) return;\n    const ov = this._cmpEl ? this._cmpEl.querySelector('[data-vidoverlay]') : null;\n    if(v.paused){ v.play().catch(() => {}); if(ov) ov.style.opacity = '0'; }\n    else { v.pause(); if(ov) ov.style.opacity = '1'; }\n  }\n\n  componentDidUpdate(){ this.applyTokens(); }\n\n  componentWillUnmount(){\n    window.removeEventListener('mousemove', this._onMove);\n    if(this._raf) cancelAnimationFrame(this._raf);\n    if(this._io) this._io.disconnect();\n    if(this._hls) this._hls.destroy();\n    if(this._move) window.removeEventListener('pointermove', this._move);\n    if(this._up) window.removeEventListener('pointerup', this._up);\n    if(this._cmpEl && this._down) this._cmpEl.removeEventListener('pointerdown', this._down);\n    if(this._wmove) window.removeEventListener('pointermove', this._wmove);\n    if(this._wup) window.removeEventListener('pointerup', this._wup);\n    if(this._wheel && this._wdown) this._wheel.removeEventListener('pointerdown', this._wdown);\n  }\n\n  openWaitlist(e){\n    if(e) e.preventDefault();\n    this.setState({ modalMounted:true, modalPhase:'form', showErr:false });\n    document.body.style.overflow = 'hidden';\n    setTimeout(() => { if(this.nameRef.current) this.nameRef.current.focus(); }, 380);\n  }\n\n  closeWaitlist(e){\n    if(e) e.preventDefault();\n    this.setState({ modalMounted:false });\n    document.body.style.overflow = '';\n  }\n\n  onBackdropClick(e){\n    if(e.currentTarget === e.target) this.closeWaitlist();\n  }\n\n  submitWaitlist(e){\n    e.preventDefault();\n    const nameI = this.nameRef.current, emailI = this.emailRef.current, cityI = this.cityRef.current;\n    const name = (nameI && nameI.value || '').trim();\n    const email = (emailI && emailI.value || '').trim();\n    const city = (cityI && cityI.value || '').trim();\n    if(!name){ this.setState({ showErr:true, errMsg:'Please enter your name.' }); if(nameI) nameI.focus(); return; }\n    if(!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)){ this.setState({ showErr:true, errMsg:'Please enter a valid email.' }); if(emailI) emailI.focus(); return; }\n    if(!city){ this.
